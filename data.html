<script>

let excelData = [];

fetch('data.xlsx')
.then(response => response.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data, {
        type: 'array',
        cellDates: true
    });

    const sheetName = workbook.SheetNames[0];
    const sheet = workbook.Sheets[sheetName];

    excelData = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: "",
        raw: true
    });

})
.catch(error => {

    document.getElementById("output").innerHTML =
        "<p class='no-data'>Unable to load data.xlsx</p>";

});


function formatDOB(value) {

    if (!value) return "";

    const months = [
        "Jan","Feb","Mar","Apr","May","Jun",
        "Jul","Aug","Sep","Oct","Nov","Dec"
    ];

    // Excel Date Object
    if (value instanceof Date) {

        return String(value.getDate()).padStart(2, "0") + "-" +
               months[value.getMonth()] + "-" +
               value.getFullYear();
    }

    // Excel Serial Number
    if (typeof value === "number") {

        const d = XLSX.SSF.parse_date_code(value);

        if (d) {
            return String(d.d).padStart(2, "0") + "-" +
                   months[d.m - 1] + "-" +
                   d.y;
        }
    }

    // String Date
    const dt = new Date(value);

    if (!isNaN(dt)) {

        return String(dt.getDate()).padStart(2, "0") + "-" +
               months[dt.getMonth()] + "-" +
               dt.getFullYear();
    }

    return value;
}


function searchUDISE() {

    const udise = document.getElementById("udise").value.trim();

    if (!udise) {
        alert("Please enter UDISE Code");
        return;
    }

    const students = [];

    // Column A = UDISE
    for (let i = 1; i < excelData.length; i++) {

        if (String(excelData[i][0]).trim() === udise) {

            students.push(excelData[i]);
        }
    }

    if (students.length === 0) {

        document.getElementById("output").innerHTML =
            "<p class='no-data'>No records found for this UDISE Code.</p>";

        return;
    }

    const first = students[0];

    const classSummary = {};

    students.forEach(row => {

        const cls = row[5] || "Blank";

        classSummary[cls] = (classSummary[cls] || 0) + 1;
    });

    let summaryRows = "";

    Object.keys(classSummary)
        .sort()
        .forEach(cls => {

            summaryRows += `
            <tr>
                <td>${cls}</td>
                <td>${classSummary[cls]}</td>
            </tr>`;
        });

    let html = `

    <div class="card">
        <h2>School Information</h2>

        <p><strong>UDISE Code:</strong> ${udise}</p>
        <p><strong>District:</strong> ${first[1] || ""}</p>
        <p><strong>Name of the School:</strong> ${first[2] || ""}</p>
        <p><strong>School Board:</strong> ${first[3] || ""}</p>
        <p><strong>Total Number of Enrolment:</strong> ${students.length}</p>
    </div>

    <div class="card">
        <h2>Class Wise Enrolment Summary</h2>

        <table class="summary-table">
            <tr>
                <th>Class</th>
                <th>Total Enrolment</th>
            </tr>

            ${summaryRows}
        </table>
    </div>

    <div class="card">
        <h2>Student Details</h2>

        <div class="table-container">

        <table>

            <thead>
                <tr>
                    <th>District</th>
                    <th>Name of the School</th>
                    <th>School Board</th>
                    <th>Name of Candidate</th>
                    <th>Class</th>
                    <th>Gender</th>
                    <th>Date of Birth</th>
                    <th>AADHAAR number</th>
                    <th>Father Name</th>
                    <th>Mother Name</th>
                    <th>Category</th>
                    <th>Sector</th>
                    <th>Job Role</th>
                    <th>Project Name (Select From Drop Down Only)</th>
                    <th>Data Verfied By (VT Name)</th>
                </tr>
            </thead>

            <tbody>
    `;

    students.forEach(row => {

        html += `
        <tr>
            <td>${row[1] || ""}</td>
            <td>${row[2] || ""}</td>
            <td>${row[3] || ""}</td>
            <td>${row[4] || ""}</td>
            <td>${row[5] || ""}</td>
            <td>${row[6] || ""}</td>
            <td>${formatDOB(row[7])}</td>
            <td>${row[8] || ""}</td>
            <td>${row[9] || ""}</td>
            <td>${row[10] || ""}</td>
            <td>${row[11] || ""}</td>
            <td>${row[12] || ""}</td>
            <td>${row[13] || ""}</td>
            <td>${row[14] || ""}</td>
            <td>${row[15] || ""}</td>
        </tr>`;
    });

    html += `
            </tbody>
        </table>

        </div>
    </div>
    `;

    document.getElementById("output").innerHTML = html;
}

</script>

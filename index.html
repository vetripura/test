<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>UDISE Student Search</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    margin:20px;
}
input{
    padding:10px;
    width:250px;
}
button{
    padding:10px 15px;
    cursor:pointer;
}
table{
    border-collapse:collapse;
    width:100%;
    margin-top:20px;
}
th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:left;
}
th{
    background:#f5f5f5;
    width:35%;
}
</style>
</head>
<body>

<h2>Student Search by UDISE Code</h2>

<input type="text" id="udise" placeholder="Enter UDISE Code">
<button onclick="searchStudent()">Search</button>

<div id="result"></div>

<script>

let sheetData = [];

// Load Excel file
fetch("data.xlsx")
.then(response => response.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data, {type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    sheetData = XLSX.utils.sheet_to_json(sheet, {
        header:1,
        defval:""
    });

});

function searchStudent(){

    const udise = document.getElementById("udise").value.trim();

    if(!udise){
        alert("Please enter UDISE Code");
        return;
    }

    let rowFound = null;

    // Search Column D (index 3)
    for(let i=1;i<sheetData.length;i++){

        if(String(sheetData[i][3]).trim() === udise){

            rowFound = sheetData[i];
            break;
        }
    }

    if(!rowFound){

        document.getElementById("result").innerHTML =
        "<p style='color:red'>No record found for this UDISE Code.</p>";

        return;
    }

    document.getElementById("result").innerHTML = `
    <table>
        <tr>
            <th>Name of Candidate</th>
            <td>${rowFound[8]}</td>
        </tr>

        <tr>
            <th>Class</th>
            <td>${rowFound[9]}</td>
        </tr>

        <tr>
            <th>Gender (Select From Drop Down Only)</th>
            <td>${rowFound[10]}</td>
        </tr>

        <tr>
            <th>Date of Birth (Example: 24-Jul-2025)</th>
            <td>${rowFound[11]}</td>
        </tr>

        <tr>
            <th>AADHAAR number (12 Digit Number)</th>
            <td>${rowFound[12]}</td>
        </tr>

        <tr>
            <th>Father Name</th>
            <td>${rowFound[13]}</td>
        </tr>

        <tr>
            <th>Mother Name</th>
            <td>${rowFound[14]}</td>
        </tr>

        <tr>
            <th>Category</th>
            <td>${rowFound[15]}</td>
        </tr>
    </table>`;
}

</script>

</body>
</html>
